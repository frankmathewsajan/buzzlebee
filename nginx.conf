server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers - Allow embedding from Dev.to
    # Removed X-Frame-Options to allow embedding on Dev.to
    # add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Handle Next.js static assets with caching
    location /_next/static {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Handle all routes - try files first, then fallback to index.html for client-side routing
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Handle 404s
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
